# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # `paste` 1.0.15 is unmaintained (author archived the repo).
    # Pulled in transitively via ratatui 0.29 → paste. It's a proc-macro,
    # so it only runs at compile time — no runtime / security impact.
    # Drop this entry when ratatui releases a version that switches off paste.
    { id = "RUSTSEC-2024-0436", reason = "transitive via ratatui; proc-macro only; no runtime impact" },
]

[licenses]
version = 2
# Add licenses here only when an actual dep introduces them. cargo-deny
# warns on unused allowances, so the list stays tight.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
